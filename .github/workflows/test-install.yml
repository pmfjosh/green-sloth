name: ci

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm

      - name: Upgrade npm
        run: npm install -g "npm@>=12.0.0-pre.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate model data files
        run: npm run validate:models

      - name: build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}"
        run: npm run build
